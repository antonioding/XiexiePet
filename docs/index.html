<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="XiexiePet 体验版，一个会陪着你说谢谢的 macOS 桌面宠物网页预览。"
    />
    <title>XiexiePet 体验版</title>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="18" fill="%23f06b4f"/><circle cx="23" cy="25" r="6" fill="%23fffaf0"/><circle cx="41" cy="25" r="6" fill="%23fffaf0"/><path d="M24 40q8 8 16 0" fill="none" stroke="%23241f1b" stroke-width="5" stroke-linecap="round"/></svg>'
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #eef7f5;
        --ink: #241f1b;
        --muted: #72695f;
        --line: rgba(36, 31, 27, 0.14);
        --shell: #f06b4f;
        --shell-dark: #c94d39;
        --cream: #ffffff;
        --water: #4c9dd8;
        --leaf: #3c8a6d;
        --gold: #d99a24;
        --shadow: 0 24px 70px rgba(80, 54, 26, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background:
          radial-gradient(circle at 18% 12%, rgba(240, 107, 79, 0.14), transparent 28rem),
          radial-gradient(circle at 82% 72%, rgba(76, 157, 216, 0.18), transparent 24rem),
          linear-gradient(145deg, #ffffff 0%, var(--bg) 56%, #edf4ff 100%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
      }

      .site-header {
        position: fixed;
        z-index: 20;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px clamp(18px, 4vw, 56px);
        backdrop-filter: blur(18px);
        background: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(36, 31, 27, 0.08);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 0.95rem;
        font-weight: 760;
        letter-spacing: 0;
        text-decoration: none;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background:
          radial-gradient(circle at 35% 35%, #ffffff 0 12%, transparent 13%),
          var(--shell);
        box-shadow: inset -5px -5px 0 rgba(91, 32, 22, 0.14);
      }

      .nav-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .button {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        padding: 0 18px;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 720;
        text-decoration: none;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(36, 31, 27, 0.24);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 12px 30px rgba(80, 54, 26, 0.12);
      }

      .button.primary {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--cream);
      }

      main {
        overflow: hidden;
      }

      .hero {
        min-height: 100svh;
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
        align-items: center;
        gap: clamp(26px, 5vw, 76px);
        padding: 112px clamp(20px, 6vw, 86px) 58px;
      }

      .hero-copy {
        max-width: 620px;
        animation: rise 700ms ease both;
      }

      h1 {
        margin: 0;
        font-size: clamp(4rem, 12vw, 9.8rem);
        line-height: 0.82;
        letter-spacing: 0;
        font-weight: 900;
      }

      .hero-copy p {
        max-width: 520px;
        margin: 28px 0 0;
        color: var(--muted);
        font-size: clamp(1.06rem, 2vw, 1.34rem);
        line-height: 1.68;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .stage-wrap {
        position: relative;
        min-height: min(68svh, 720px);
        display: grid;
        place-items: center;
        perspective: 1100px;
      }

      .stage {
        position: relative;
        width: min(92vw, 610px);
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, rgba(255, 255, 255, 0.82) 0 34%, transparent 35%),
          radial-gradient(circle at center, rgba(240, 107, 79, 0.12) 0 53%, transparent 54%),
          conic-gradient(from 140deg, rgba(60, 138, 109, 0.12), rgba(76, 157, 216, 0.16), rgba(217, 154, 36, 0.14), rgba(60, 138, 109, 0.12));
        box-shadow: var(--shadow);
      }

      .orbit {
        position: absolute;
        inset: 10%;
        border-radius: 50%;
        border: 1px dashed rgba(36, 31, 27, 0.2);
        animation: spin 18s linear infinite;
      }

      .chip {
        position: absolute;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 32px rgba(80, 54, 26, 0.12);
        color: var(--ink);
        font-weight: 840;
      }

      .chip:nth-child(2) {
        top: 13%;
        right: 18%;
        color: var(--water);
      }

      .chip:nth-child(3) {
        left: 12%;
        bottom: 20%;
        color: var(--leaf);
      }

      .chip:nth-child(4) {
        right: 16%;
        bottom: 14%;
        color: var(--gold);
      }

      .pet-button {
        appearance: none;
        position: relative;
        z-index: 2;
        width: 58%;
        aspect-ratio: 1.15 / 1;
        border: 0;
        background: transparent;
        cursor: pointer;
        filter: drop-shadow(0 28px 28px rgba(110, 57, 31, 0.22));
        transform-origin: center bottom;
      }

      .pet-button:focus-visible {
        outline: 3px solid rgba(76, 157, 216, 0.9);
        outline-offset: 14px;
        border-radius: 44%;
      }

      .pet {
        position: absolute;
        inset: 8% 3% 2%;
        transform-origin: center bottom;
        animation: breathe 4.2s ease-in-out infinite;
      }

      .leg,
      .claw,
      .eye-stalk,
      .body,
      .eye,
      .mouth,
      .shine {
        position: absolute;
      }

      .body {
        left: 14%;
        right: 14%;
        bottom: 9%;
        height: 58%;
        border-radius: 48% 48% 40% 40%;
        background:
          radial-gradient(circle at 31% 23%, rgba(255, 250, 222, 0.85) 0 9%, transparent 10%),
          linear-gradient(145deg, #ff8d62 0%, var(--shell) 54%, var(--shell-dark) 100%);
        box-shadow:
          inset 0 -20px 0 rgba(107, 33, 22, 0.13),
          inset -18px -2px 0 rgba(107, 33, 22, 0.08);
      }

      .shine {
        top: 18%;
        left: 27%;
        width: 24%;
        height: 16%;
        border-radius: 50%;
        background: rgba(255, 244, 214, 0.54);
        transform: rotate(-18deg);
      }

      .eye-stalk {
        top: 4%;
        width: 16%;
        height: 36%;
        border-radius: 999px;
        background: var(--shell-dark);
        transform-origin: center bottom;
      }

      .eye-stalk.left {
        left: 32%;
        transform: rotate(-11deg);
      }

      .eye-stalk.right {
        right: 32%;
        transform: rotate(11deg);
      }

      .eye {
        top: -8%;
        left: 50%;
        width: 62%;
        aspect-ratio: 1;
        transform: translateX(-50%);
        border-radius: 50%;
        background: #fffdf5;
        box-shadow: inset 0 -5px 0 rgba(36, 31, 27, 0.08);
      }

      .eye::after {
        content: "";
        position: absolute;
        left: 38%;
        top: 38%;
        width: 32%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--ink);
        animation: blink 5.6s ease-in-out infinite;
      }

      .mouth {
        left: 43%;
        top: 47%;
        width: 14%;
        height: 8%;
        border-bottom: 5px solid rgba(36, 31, 27, 0.72);
        border-radius: 0 0 999px 999px;
      }

      .claw {
        top: 43%;
        width: 24%;
        height: 22%;
        border-radius: 60% 60% 50% 50%;
        background: linear-gradient(145deg, #ff8d62, var(--shell-dark));
      }

      .claw.left {
        left: 0;
        transform: rotate(-30deg);
      }

      .claw.right {
        right: 0;
        transform: rotate(30deg);
      }

      .claw::after {
        content: "";
        position: absolute;
        top: 18%;
        width: 42%;
        height: 52%;
        border-radius: 70% 70% 20% 20%;
        background: var(--cream);
      }

      .claw.left::after {
        right: 7%;
        transform: rotate(22deg);
      }

      .claw.right::after {
        left: 7%;
        transform: rotate(-22deg);
      }

      .leg {
        bottom: 0;
        width: 14%;
        height: 26%;
        border-radius: 999px;
        background: var(--shell-dark);
        transform-origin: center top;
      }

      .leg.one {
        left: 24%;
        transform: rotate(20deg);
      }

      .leg.two {
        left: 39%;
        transform: rotate(6deg);
      }

      .leg.three {
        right: 39%;
        transform: rotate(-6deg);
      }

      .leg.four {
        right: 24%;
        transform: rotate(-20deg);
      }

      .bubble {
        position: absolute;
        z-index: 4;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        min-width: 132px;
        padding: 12px 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(36, 31, 27, 0.12);
        color: var(--ink);
        box-shadow: 0 18px 46px rgba(80, 54, 26, 0.14);
        font-weight: 820;
        text-align: center;
        opacity: 0;
        translate: 0 18px;
        transition:
          opacity 260ms ease,
          translate 260ms ease;
      }

      .stage.is-speaking .bubble {
        opacity: 1;
        translate: 0 0;
      }

      .stage.is-happy .pet {
        animation: happy 560ms ease both;
      }

      .stage.is-sleepy .pet {
        animation: sleepy 1.2s ease both;
      }

      .controls {
        position: absolute;
        left: 50%;
        bottom: 8%;
        z-index: 5;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        padding: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(36, 31, 27, 0.1);
        backdrop-filter: blur(14px);
      }

      .icon-button {
        appearance: none;
        border: 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.66);
        color: var(--ink);
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 900;
        transition:
          transform 160ms ease,
          background 160ms ease;
      }

      .icon-button:hover,
      .icon-button:focus-visible {
        transform: translateY(-2px);
        background: #fff;
      }

      .info {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(18px, 4vw, 42px);
        padding: 10px clamp(20px, 6vw, 86px) 86px;
      }

      .info-block {
        border-top: 1px solid var(--line);
        padding-top: 20px;
      }

      .info-block h2 {
        margin: 0;
        font-size: clamp(1.3rem, 2vw, 1.75rem);
        line-height: 1.14;
        letter-spacing: 0;
      }

      .info-block p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.68;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        z-index: 30;
        transform: translate(-50%, 20px);
        opacity: 0;
        pointer-events: none;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(36, 31, 27, 0.92);
        color: var(--cream);
        font-size: 0.9rem;
        font-weight: 700;
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .toast.is-visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-5px) scale(1.025);
        }
      }

      @keyframes happy {
        0%,
        100% {
          transform: translateY(0) rotate(0deg) scale(1);
        }
        25% {
          transform: translateY(-18px) rotate(-7deg) scale(1.03);
        }
        55% {
          transform: translateY(-10px) rotate(7deg) scale(1.04);
        }
      }

      @keyframes sleepy {
        0% {
          transform: rotate(0deg) translateY(0);
        }
        100% {
          transform: rotate(-7deg) translateY(12px) scale(0.96);
        }
      }

      @keyframes blink {
        0%,
        91%,
        100% {
          transform: scaleY(1);
        }
        94%,
        97% {
          transform: scaleY(0.12);
        }
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
          padding-top: 100px;
        }

        .hero-copy {
          max-width: none;
        }

        .stage-wrap {
          min-height: 560px;
        }

        .info {
          grid-template-columns: 1fr;
          padding-bottom: 64px;
        }
      }

      @media (max-width: 560px) {
        .site-header {
          padding: 14px 16px;
        }

        .brand span:last-child {
          display: none;
        }

        .nav-actions .button:first-child {
          display: none;
        }

        .button {
          min-height: 40px;
          padding: 0 14px;
          font-size: 0.84rem;
        }

        .hero {
          padding-inline: 18px;
          padding-bottom: 40px;
        }

        h1 {
          font-size: clamp(3.4rem, 24vw, 6.5rem);
        }

        .hero-copy p {
          margin-top: 20px;
        }

        .stage-wrap {
          min-height: 430px;
        }

        .stage {
          width: min(92vw, 390px);
        }

        .chip {
          width: 44px;
          height: 44px;
        }

        .controls {
          bottom: 5%;
        }

        .icon-button {
          width: 40px;
          height: 40px;
        }

        .info {
          padding-inline: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header" aria-label="站点导航">
      <a class="brand" href="#" aria-label="XiexiePet 首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>XiexiePet</span>
      </a>
      <nav class="nav-actions" aria-label="主要操作">
        <a class="button" href="https://github.com/antonioding/XiexiePet">GitHub</a>
        <a class="button primary" href="https://github.com/antonioding/XiexiePet/releases">下载</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy">
          <h1 id="hero-title">谢谢</h1>
          <p>
            一个低打扰的 macOS 桌面宠物。它会浮在桌面边上，眨眼、呼吸、犯困，
            也会在你点它的时候轻轻说一声谢谢。
          </p>
          <div class="hero-actions">
            <button class="button primary" type="button" data-action="pet">摸摸它</button>
            <a class="button" href="#details">了解体验版</a>
          </div>
        </div>

        <div class="stage-wrap" aria-label="XiexiePet 网页体验版">
          <div class="stage" id="stage">
            <div class="orbit" aria-hidden="true"></div>
            <span class="chip" aria-hidden="true">水</span>
            <span class="chip" aria-hidden="true">食</span>
            <span class="chip" aria-hidden="true">眠</span>
            <div class="bubble" id="bubble" role="status" aria-live="polite">谢谢</div>
            <button class="pet-button" type="button" data-action="pet" aria-label="摸摸 XiexiePet">
              <span class="pet" aria-hidden="true">
                <span class="eye-stalk left"><span class="eye"></span></span>
                <span class="eye-stalk right"><span class="eye"></span></span>
                <span class="claw left"></span>
                <span class="claw right"></span>
                <span class="leg one"></span>
                <span class="leg two"></span>
                <span class="leg three"></span>
                <span class="leg four"></span>
                <span class="body">
                  <span class="shine"></span>
                  <span class="mouth"></span>
                </span>
              </span>
            </button>
            <div class="controls" aria-label="宠物操作">
              <button class="icon-button" type="button" data-action="feed" aria-label="喂食">食</button>
              <button class="icon-button" type="button" data-action="water" aria-label="喂水">水</button>
              <button class="icon-button" type="button" data-action="sleep" aria-label="休息">眠</button>
            </div>
          </div>
        </div>
      </section>

      <section class="info" id="details" aria-label="体验版说明">
        <article class="info-block">
          <h2>网页里先感受性格</h2>
          <p>这个体验版模拟桌宠的轻互动，适合先分享给朋友点开看看。</p>
        </article>
        <article class="info-block">
          <h2>原生版留在 macOS</h2>
          <p>真正的置顶窗口、菜单栏、拖拽和系统状态感知，会在 macOS 应用里运行。</p>
        </article>
        <article class="info-block">
          <h2>本地优先</h2>
          <p>项目没有网络服务和账号体系，代码开放在 GitHub，体验版也只是一页静态网页。</p>
        </article>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const stage = document.querySelector("#stage");
      const bubble = document.querySelector("#bubble");
      const toast = document.querySelector("#toast");
      const messages = {
        pet: ["谢谢", "嘿嘿", "今天也辛苦啦"],
        feed: ["谢谢，好吃", "能量 +1", "蟹蟹饱了"],
        water: ["咕噜", "清醒一点了", "水分补给"],
        sleep: ["先眯一会儿", "晚安", "省电模式"]
      };
      let timer;

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function speak(action) {
        const sleepy = action === "sleep";
        const text = pick(messages[action] || messages.pet);
        clearTimeout(timer);
        bubble.textContent = text;
        toast.textContent = text;
        stage.classList.remove("is-speaking", "is-happy", "is-sleepy");
        toast.classList.remove("is-visible");
        requestAnimationFrame(() => {
          stage.classList.add("is-speaking", sleepy ? "is-sleepy" : "is-happy");
          toast.classList.add("is-visible");
        });
        timer = window.setTimeout(() => {
          stage.classList.remove("is-speaking", "is-happy", "is-sleepy");
          toast.classList.remove("is-visible");
        }, sleepy ? 1800 : 1500);
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        speak(target.dataset.action);
      });

      window.setInterval(() => {
        if (!stage.classList.contains("is-speaking")) {
          speak("pet");
        }
      }, 12000);
    </script>
  </body>
</html>
